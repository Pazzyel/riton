server:
  port: 8045
spring:
  profiles:
    active: dev
  application:
    name: riton
  datasource:
    driver-class-name: ${riton.datasource.driver-class-name}
    url: ${riton.datasource.url}
    username: ${riton.datasource.username}
    password: ${riton.datasource.password}
  data:
    redis:
      host: ${riton.redis.host}
      port: ${riton.redis.port}
      password: ${riton.redis.password}
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.riton.entity # 别名扫描包
logging:
  level:
    com.riton: debug
rocketmq:
  name-server: ${riton.rocketmq.address}
  producer:
    group: ${riton.rocketmq.group}

pay:
  refund-reason: order status invalid when payment callback
  alipay:
    # 示例配置：请替换为你自己的支付宝应用配置
    gateway-url: https://openapi.alipay.com/gateway.do
    app-id: your_alipay_app_id
    private-key: |
      -----BEGIN PRIVATE KEY-----
      your_alipay_private_key
      -----END PRIVATE KEY-----
    alipay-public-key: |
      -----BEGIN PUBLIC KEY-----
      your_alipay_public_key
      -----END PUBLIC KEY-----
    charset: UTF-8
    sign-type: RSA2
    notify-url: https://your-domain.com/pay/callback/alipay
  wechat:
    # 示例配置：请替换为你自己的微信商户配置
    mch-id: your_wechat_mch_id
    app-id: your_wechat_app_id
    private-key-path: /path/to/apiclient_key.pem
    merchant-serial-number: your_wechat_merchant_serial_number
    api-v3-key: your_wechat_api_v3_key
    notify-url: https://your-domain.com/pay/callback/wechat

riton:
  elasticsearch:
    host: localhost
    port: 9200
    scheme: http
