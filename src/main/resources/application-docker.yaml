riton:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://mysql:3306/redis_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: root
  redis:
    host: redis
    port: 6379
    password: riton-redis-pass
  rocketmq:
    address: rocketmq-namesrv:9876
    group: riton-provider-group
  elasticsearch:
    host: elasticsearch
    port: 9200
    scheme: http
